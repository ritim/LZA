spring:
  application:
    name: aethercare-api
  profiles:
    default: local
  cloud:
    vault:
      # 預設關閉 Vault auto-config；application-vault.yml 才打開
      enabled: false
  datasource:
    url: ${AETHERCARE_DB_URL:jdbc:postgresql://localhost:15432/aethercare}
    username: ${AETHERCARE_DB_USER:aethercare}
    password: ${AETHERCARE_DB_PASSWORD:aethercare}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true
  data:
    redis:
      host: ${AETHERCARE_REDIS_HOST:localhost}
      port: ${AETHERCARE_REDIS_PORT:16379}
      timeout: 2s
  kafka:
    bootstrap-servers: ${AETHERCARE_KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: aethercare-api
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework
  shutdown: graceful

management:
  server:
    # actuator 跑獨立 port，避免與 API 同 port 暴露 metrics / prometheus
    # production 建議由 Network ACL / k8s NetworkPolicy 限制此 port 只給內網
    port: ${MANAGEMENT_SERVER_PORT:9001}
    # 預設 listen 全 interface；production 可用 127.0.0.1 限本機，由 sidecar 轉送
    address: ${MANAGEMENT_SERVER_ADDRESS:0.0.0.0}
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  health:
    # Vault health indicator 與 vault enabled 分離；預設關閉避免 boot 時連 vault
    vault:
      enabled: false
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

aethercare:
  kafka:
    topics:
      event-created: care.event.created
      workflow-started: care.workflow.started
      task-created: care.task.created
      notification-sent: care.notification.sent
      action-received: care.action.received
      audit-created: care.audit.created
  scheduler:
    timeout-scan-fixed-delay: 5000
  outbox:
    publish-fixed-delay: 2000   # ms
    batch-size: 50
    max-attempts: 10
    backoff-base-seconds: 5
    cleanup:
      enabled: true
      retention-days: 7
      # 每次跑最多 max-batches-per-run × batch-size 筆，避免單次過長
      batch-size: 1000
      max-batches-per-run: 50
      # cron: 秒 分 時 日 月 週（Spring 6 cron），UTC 時區
      cron: "0 15 3 * * *"
  redis:
    workflow-lock-ttl-seconds: 300
    elder-status-ttl-seconds: 3600
  security:
    jwt:
      # MVP 用 dev secret（base64 編碼，至少 32 bytes for HS256）；production 必須以 env override
      secret: ${AETHERCARE_JWT_SECRET:Y2hhbmdlLW1lLWluLXByb2R1Y3Rpb24tcGxlYXNlLW9yLXlvdS1nZXQtaGFja2VkLTIwMjY=}
      expiry-seconds: 3600
      refresh:
        # refresh token 30 天；rotation + reuse detection
        expiry-days: 30
        cleanup:
          enabled: true
          revoked-retention-days: 7
          batch-size: 1000
          max-batches-per-run: 50
          # cron: 秒 分 時 日 月 週（Spring 6 cron），UTC 時區；錯開 outbox cleanup 03:15
          cron: "0 30 3 * * *"
    cors:
      allowed-origins: ${AETHERCARE_CORS_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:8080}
    seed-demo-users: ${AETHERCARE_SEED_DEMO_USERS:false}
    actuator:
      # actuator HTTP Basic auth 帳號（給 Prometheus / Grafana scrape 用）
      # production 必須以 env 覆蓋；dev 預設 password 啟動時會有 WARN log
      username: ${AETHERCARE_ACTUATOR_USERNAME:actuator}
      password: ${AETHERCARE_ACTUATOR_PASSWORD:actuator-dev-pass}
  anomaly:
    z-score-threshold: 3.0
    scheduler:
      enabled: true
      fixed-delay: 300000   # 5 min
    baseline:
      lookback-days: 14
      min-samples: 3
  # Multi-tenant SaaS framework（系統設計 §20 Phase 2）
  tenant:
    default-id: 1
    default-code: default
  ai:
    # AI provider 切換：static = MVP 由 CareKnowledgeBase 提供；
    # 未來可加 openai / claude 等真 LLM impl，並以 @ConditionalOnProperty 切換。
    provider: static
    # AI Care Chat reply 文字生成設定。
    # provider: none | anthropic | ollama；none 走 rules engine 模板池，無外部依賴。
    chat:
      provider: ${AETHERCARE_AI_CHAT_PROVIDER:none}
      model: ${AETHERCARE_AI_CHAT_MODEL:claude-haiku-4-5}
      max-tokens: 1024
      timeout-ms: 8000
      api-key: ${ANTHROPIC_API_KEY:}
      ollama-base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      ollama-model: ${AETHERCARE_AI_CHAT_OLLAMA_MODEL:qwen2.5:7b}
      history-limit: 12

logging:
  level:
    root: INFO
    com.lza.aethercare: DEBUG