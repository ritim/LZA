databaseChangeLog:
  - changeSet:
      id: 0018-create-elder-profile
      author: autopilot
      changes:
        - createTable:
            tableName: elder_profile
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: BIGINT
                  defaultValueNumeric: 1
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: age
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: gender
                  type: VARCHAR(20)
                  constraints:
                    nullable: true
              - column:
                  name: mobility
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: chronic_diseases
                  type: jsonb
                  constraints:
                    nullable: true
              - column:
                  name: allergies
                  type: jsonb
                  constraints:
                    nullable: true
              - column:
                  name: address
                  type: VARCHAR(255)
                  constraints:
                    nullable: true
              - column:
                  name: emergency_notes
                  type: TEXT
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: elder_profile
            baseColumnNames: tenant_id
            constraintName: fk_elder_profile_tenant
            referencedTableName: tenant
            referencedColumnNames: id
        - createIndex:
            tableName: elder_profile
            indexName: idx_elder_profile_tenant
            columns:
              - column:
                  name: tenant_id
      rollback:
        - dropIndex:
            tableName: elder_profile
            indexName: idx_elder_profile_tenant
        - dropForeignKeyConstraint:
            baseTableName: elder_profile
            constraintName: fk_elder_profile_tenant
        - dropTable:
            tableName: elder_profile

  - changeSet:
      id: 0018-create-elder-contact
      author: autopilot
      changes:
        - createTable:
            tableName: elder_contact
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: BIGINT
                  defaultValueNumeric: 1
                  constraints:
                    nullable: false
              - column:
                  name: elder_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: relationship
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: phone
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: priority_level
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: elder_contact
            baseColumnNames: tenant_id
            constraintName: fk_elder_contact_tenant
            referencedTableName: tenant
            referencedColumnNames: id
        - addUniqueConstraint:
            tableName: elder_contact
            constraintName: uq_elder_contact_priority
            columnNames: elder_id, priority_level
        - createIndex:
            tableName: elder_contact
            indexName: idx_elder_contact_tenant
            columns:
              - column:
                  name: tenant_id
        - createIndex:
            tableName: elder_contact
            indexName: idx_elder_contact_elder
            columns:
              - column:
                  name: elder_id
              - column:
                  name: priority_level
      rollback:
        - dropIndex:
            tableName: elder_contact
            indexName: idx_elder_contact_elder
        - dropIndex:
            tableName: elder_contact
            indexName: idx_elder_contact_tenant
        - dropUniqueConstraint:
            tableName: elder_contact
            constraintName: uq_elder_contact_priority
        - dropForeignKeyConstraint:
            baseTableName: elder_contact
            constraintName: fk_elder_contact_tenant
        - dropTable:
            tableName: elder_contact
