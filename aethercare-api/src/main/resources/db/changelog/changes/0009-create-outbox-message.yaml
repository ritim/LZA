databaseChangeLog:
  - changeSet:
      id: 0009-create-outbox-message
      author: autopilot
      changes:
        - createTable:
            tableName: outbox_message
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: target_topic
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: message_key
                  type: VARCHAR(100)
                  constraints:
                    nullable: true
              - column:
                  name: payload
                  type: JSONB
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: attempt_count
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: next_attempt_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
              - column:
                  name: last_error
                  type: TEXT
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
              - column:
                  name: sent_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: true
              - column:
                  name: version
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
        - createIndex:
            tableName: outbox_message
            indexName: idx_outbox_status_next_attempt
            columns:
              - column:
                  name: status
              - column:
                  name: next_attempt_at
