databaseChangeLog:
  - changeSet:
      id: 0004-create-care-action
      author: autopilot
      changes:
        - createTable:
            tableName: care_action
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: workflow_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_action_workflow
                    referencedTableName: care_workflow_instance
                    referencedColumnNames: id
              - column:
                  name: task_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_action_task
                    referencedTableName: care_task
                    referencedColumnNames: id
              - column:
                  name: actor_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: action_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: note
                  type: TEXT
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
        - createIndex:
            tableName: care_action
            indexName: idx_action_workflow
            columns:
              - column:
                  name: workflow_id
        - createIndex:
            tableName: care_action
            indexName: idx_action_task
            columns:
              - column:
                  name: task_id
