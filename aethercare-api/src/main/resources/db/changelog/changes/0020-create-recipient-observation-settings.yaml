databaseChangeLog:
  - changeSet:
      id: 0020-create-recipient-observation-settings
      author: autopilot
      comment: |
        Spec § Master §0 / Gap C：建立 recipient_observation_settings，
        紀錄被照顧者的預期 check-in 時間、grace period、無活動門檻、被動監測開關。
        本 schema 沒有對 elder_profile / care_recipients 加外鍵，避免 v2 重命名時鎖死。
      changes:
        - createTable:
            tableName: recipient_observation_settings
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: BIGINT
                  defaultValueNumeric: 1
                  constraints:
                    nullable: false
              - column:
                  name: care_recipient_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uq_obs_settings_recipient
              - column:
                  name: expected_checkin_time
                  type: TIME
                  constraints:
                    nullable: true
              - column:
                  name: checkin_grace_minutes
                  type: INT
                  defaultValueNumeric: 60
                  constraints:
                    nullable: false
              - column:
                  name: max_inactive_minutes_daytime
                  type: INT
                  defaultValueNumeric: 180
                  constraints:
                    nullable: false
              - column:
                  name: max_inactive_minutes_night
                  type: INT
                  defaultValueNumeric: 480
                  constraints:
                    nullable: false
              - column:
                  name: passive_monitoring_enabled
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: escalation_policy_json
                  type: jsonb
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: recipient_observation_settings
            baseColumnNames: tenant_id
            constraintName: fk_obs_settings_tenant
            referencedTableName: tenant
            referencedColumnNames: id
        - createIndex:
            tableName: recipient_observation_settings
            indexName: idx_obs_settings_tenant
            columns:
              - column:
                  name: tenant_id
      rollback:
        - dropIndex:
            tableName: recipient_observation_settings
            indexName: idx_obs_settings_tenant
        - dropForeignKeyConstraint:
            baseTableName: recipient_observation_settings
            constraintName: fk_obs_settings_tenant
        - dropTable:
            tableName: recipient_observation_settings

  - changeSet:
      id: 0020-seed-recipient-observation-settings
      author: autopilot
      comment: |
        Seed 王美玉（id=301）與 Demo 王美玉（id=1001）的 observation settings。
        對應 CLAUDE.md canonical demo：09:00 expected check-in、60 min grace、PASSIVE。
      changes:
        - insert:
            tableName: recipient_observation_settings
            columns:
              - column:
                  name: tenant_id
                  valueNumeric: 1
              - column:
                  name: care_recipient_id
                  valueNumeric: 301
              - column:
                  name: expected_checkin_time
                  value: "09:00:00"
              - column:
                  name: checkin_grace_minutes
                  valueNumeric: 60
              - column:
                  name: max_inactive_minutes_daytime
                  valueNumeric: 180
              - column:
                  name: max_inactive_minutes_night
                  valueNumeric: 480
              - column:
                  name: passive_monitoring_enabled
                  valueBoolean: true
        - insert:
            tableName: recipient_observation_settings
            columns:
              - column:
                  name: tenant_id
                  valueNumeric: 1
              - column:
                  name: care_recipient_id
                  valueNumeric: 1001
              - column:
                  name: expected_checkin_time
                  value: "09:00:00"
              - column:
                  name: checkin_grace_minutes
                  valueNumeric: 60
              - column:
                  name: max_inactive_minutes_daytime
                  valueNumeric: 180
              - column:
                  name: max_inactive_minutes_night
                  valueNumeric: 480
              - column:
                  name: passive_monitoring_enabled
                  valueBoolean: true
      rollback:
        - delete:
            tableName: recipient_observation_settings
            where: "care_recipient_id IN (301, 1001)"
