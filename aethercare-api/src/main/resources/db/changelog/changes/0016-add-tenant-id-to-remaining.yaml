databaseChangeLog:
  - changeSet:
      id: 0016-add-tenant-id-elder-activity-event
      author: autopilot
      changes:
        - addColumn:
            tableName: elder_activity_event
            columns:
              - column:
                  name: tenant_id
                  type: BIGINT
                  defaultValueNumeric: 1
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: elder_activity_event
            baseColumnNames: tenant_id
            constraintName: fk_elder_activity_event_tenant
            referencedTableName: tenant
            referencedColumnNames: id
        - createIndex:
            tableName: elder_activity_event
            indexName: idx_elder_activity_event_tenant
            columns:
              - column:
                  name: tenant_id
      rollback:
        - dropIndex:
            tableName: elder_activity_event
            indexName: idx_elder_activity_event_tenant
        - dropForeignKeyConstraint:
            baseTableName: elder_activity_event
            constraintName: fk_elder_activity_event_tenant
        - dropColumn:
            tableName: elder_activity_event
            columnName: tenant_id

