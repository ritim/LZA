databaseChangeLog:
  - changeSet:
      id: 0019-seed-elder-profile
      author: autopilot
      changes:
        - insert:
            tableName: elder_profile
            columns:
              - column:
                  name: id
                  valueNumeric: 301
              - column:
                  name: tenant_id
                  valueNumeric: 1
              - column:
                  name: name
                  value: 王美玉
              - column:
                  name: age
                  valueNumeric: 82
              - column:
                  name: gender
                  value: FEMALE
              - column:
                  name: mobility
                  value: LOW
              - column:
                  name: chronic_diseases
                  valueComputed: "'[\"diabetes\",\"hypertension\"]'::jsonb"
              - column:
                  name: allergies
                  valueComputed: "'[]'::jsonb"
              - column:
                  name: address
                  value: 台北市大安區某路某號
              - column:
                  name: emergency_notes
                  value: 曾有跌倒紀錄，行動較慢
        - insert:
            tableName: elder_contact
            columns:
              - column:
                  name: tenant_id
                  valueNumeric: 1
              - column:
                  name: elder_id
                  valueNumeric: 301
              - column:
                  name: name
                  value: 王先生
              - column:
                  name: relationship
                  value: 兒子
              - column:
                  name: phone
                  value: "+886912345678"
              - column:
                  name: priority_level
                  valueNumeric: 1
        - insert:
            tableName: elder_contact
            columns:
              - column:
                  name: tenant_id
                  valueNumeric: 1
              - column:
                  name: elder_id
                  valueNumeric: 301
              - column:
                  name: name
                  value: 陳小姐
              - column:
                  name: relationship
                  value: 女兒
              - column:
                  name: phone
                  value: "+886923456789"
              - column:
                  name: priority_level
                  valueNumeric: 2
        # 既有 demo（aethercare-web Dashboard demo button 用 elderId=1001）
        # 對應 0007-seed-demo-data 已建立的 escalation contacts。
        - insert:
            tableName: elder_profile
            columns:
              - column:
                  name: id
                  valueNumeric: 1001
              - column:
                  name: tenant_id
                  valueNumeric: 1
              - column:
                  name: name
                  value: 王美玉（Demo）
              - column:
                  name: age
                  valueNumeric: 82
              - column:
                  name: gender
                  value: FEMALE
              - column:
                  name: mobility
                  value: LOW
              - column:
                  name: chronic_diseases
                  valueComputed: "'[\"diabetes\",\"hypertension\"]'::jsonb"
              - column:
                  name: allergies
                  valueComputed: "'[]'::jsonb"
              - column:
                  name: address
                  value: 台北市大安區（Demo）
              - column:
                  name: emergency_notes
                  value: 曾有跌倒紀錄，行動較慢
        - insert:
            tableName: elder_contact
            columns:
              - column:
                  name: tenant_id
                  valueNumeric: 1
              - column:
                  name: elder_id
                  valueNumeric: 1001
              - column:
                  name: name
                  value: 王先生（Demo）
              - column:
                  name: relationship
                  value: 兒子
              - column:
                  name: phone
                  value: "+886900000001"
              - column:
                  name: priority_level
                  valueNumeric: 1
        - insert:
            tableName: elder_contact
            columns:
              - column:
                  name: tenant_id
                  valueNumeric: 1
              - column:
                  name: elder_id
                  valueNumeric: 1001
              - column:
                  name: name
                  value: 陳小姐（Demo）
              - column:
                  name: relationship
                  value: 女兒
              - column:
                  name: phone
                  value: "+886900000002"
              - column:
                  name: priority_level
                  valueNumeric: 2
      rollback:
        - delete:
            tableName: elder_contact
            where: "elder_id IN (301, 1001)"
        - delete:
            tableName: elder_profile
            where: "id IN (301, 1001)"
