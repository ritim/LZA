databaseChangeLog:
  - changeSet:
      id: 0010-create-refresh-token
      author: autopilot
      changes:
        - createTable:
            tableName: refresh_token
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: token_hash
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uq_refresh_token_hash
              - column:
                  name: issued_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false
              - column:
                  name: expires_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false
              - column:
                  name: revoked
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: revoked_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: true
              - column:
                  name: replaced_by_id
                  type: BIGINT
                  constraints:
                    nullable: true
              - column:
                  name: user_agent
                  type: VARCHAR(500)
                  constraints:
                    nullable: true
              - column:
                  name: ip_address
                  type: VARCHAR(50)
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: refresh_token
            baseColumnNames: user_id
            constraintName: fk_refresh_token_user
            referencedTableName: app_user
            referencedColumnNames: id
        - createIndex:
            tableName: refresh_token
            indexName: idx_refresh_token_user_revoked
            columns:
              - column:
                  name: user_id
              - column:
                  name: revoked
              - column:
                  name: expires_at
