databaseChangeLog:
  - changeSet:
      id: 0022-create-ai-chat-messages
      author: autopilot
      comment: |
        Spec § AI_Care_Chat §8：建立 ai_chat_messages 表，存事件綁定 AI Care Chat 的
        對話歷史（caregiver USER 訊息 + ASSISTANT 回覆 + SYSTEM 事件）。
        FK 不加（沿用既有命名習慣，避免 v2 rename 鎖死），但加索引給 history 查詢。
      changes:
        - createTable:
            tableName: ai_chat_messages
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: BIGINT
                  defaultValueNumeric: 1
                  constraints:
                    nullable: false
              - column:
                  name: workflow_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: care_event_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: task_id
                  type: BIGINT
                  constraints:
                    nullable: true
              - column:
                  name: actor_user_id
                  type: BIGINT
                  constraints:
                    nullable: true
              - column:
                  name: role
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: source
                  type: VARCHAR(30)
                  constraints:
                    nullable: false
              - column:
                  name: message
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: structured_json
                  type: jsonb
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: ai_chat_messages
            baseColumnNames: tenant_id
            constraintName: fk_ai_chat_messages_tenant
            referencedTableName: tenant
            referencedColumnNames: id
        - createIndex:
            tableName: ai_chat_messages
            indexName: idx_ai_chat_workflow_created
            columns:
              - column:
                  name: workflow_id
              - column:
                  name: created_at
        - createIndex:
            tableName: ai_chat_messages
            indexName: idx_ai_chat_messages_tenant
            columns:
              - column:
                  name: tenant_id
      rollback:
        - dropIndex:
            tableName: ai_chat_messages
            indexName: idx_ai_chat_messages_tenant
        - dropIndex:
            tableName: ai_chat_messages
            indexName: idx_ai_chat_workflow_created
        - dropForeignKeyConstraint:
            baseTableName: ai_chat_messages
            constraintName: fk_ai_chat_messages_tenant
        - dropTable:
            tableName: ai_chat_messages
