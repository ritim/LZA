databaseChangeLog:
  - changeSet:
      id: 0001-create-care-event
      author: autopilot
      changes:
        - createTable:
            tableName: care_event
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: elder_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: source
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: event_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: risk_level
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(30)
                  constraints:
                    nullable: false
              - column:
                  name: metadata
                  type: JSONB
                  constraints:
                    nullable: true
              - column:
                  name: occurred_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
        - createIndex:
            tableName: care_event
            indexName: idx_care_event_elder
            columns:
              - column:
                  name: elder_id
              - column:
                  name: occurred_at
                  descending: true
        - createIndex:
            tableName: care_event
            indexName: idx_care_event_status
            columns:
              - column:
                  name: status
