databaseChangeLog:
  - changeSet:
      id: 0015-add-tenant-id-app-user
      author: autopilot
      changes:
        - addColumn:
            tableName: app_user
            columns:
              - column:
                  name: tenant_id
                  type: BIGINT
                  defaultValueNumeric: 1
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: app_user
            baseColumnNames: tenant_id
            constraintName: fk_app_user_tenant
            referencedTableName: tenant
            referencedColumnNames: id
        - createIndex:
            tableName: app_user
            indexName: idx_app_user_tenant
            columns:
              - column:
                  name: tenant_id
      rollback:
        - dropIndex:
            tableName: app_user
            indexName: idx_app_user_tenant
        - dropForeignKeyConstraint:
            baseTableName: app_user
            constraintName: fk_app_user_tenant
        - dropColumn:
            tableName: app_user
            columnName: tenant_id

