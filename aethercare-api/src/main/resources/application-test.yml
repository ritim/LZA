spring:
  jpa:
    show-sql: false
    # 強制 Hibernate 用 UTC 解讀 DB TIME / TIMESTAMP 欄位，避免 LocalTime 被轉成 JVM tz。
    # 例：DB '00:00:00' 在 JVM=Asia/Taipei 預設下會被 read as LocalTime '08:00:00'，導致
    # MissedCheckInScanner 的 expectedCheckinTime 比預期晚 8 小時觸發。
    properties:
      hibernate.jdbc.time_zone: UTC
  liquibase:
    enabled: true

# Test profile 把 management server 關閉，避免 IT 多 context 啟動時 9001 port 衝突
management:
  server:
    port: -1

aethercare:
  scheduler:
    timeout-scan-fixed-delay: 200
    timeout-scan:
      # IT 需要 scanner 觸發 escalation 路徑；顯式打開避免 production 預設值飄移
      enabled: true
  security:
    # IT 需 demo users (family01 / insurer01 …) 登入
    seed-demo-users: true

logging:
  level:
    com.lza.aethercare: INFO
    org.testcontainers: INFO
    org.hibernate.SQL: WARN
