# Gradle daemon 用 Homebrew openjdk@21（arm64）
# 原因：Gradle 8.14.4 內嵌 Kotlin compiler 不識別 Java 25 字串
# (java.lang.IllegalArgumentException: 25 in JavaVersion.parse)，
# 故 daemon 強制使用 Java 21 LTS。Java toolchain 同樣為 21。
org.gradle.java.home=/opt/homebrew/opt/openjdk@21/libexec/openjdk.jdk/Contents/Home
org.gradle.parallel=true
org.gradle.caching=true
